<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <!--
    GitHub Pages SPA redirect.
    GitHub Pages doesn't support client-side routing natively.
    This 404.html intercepts unknown paths and redirects to index.html
    with the original path encoded as a query parameter.
  -->
  <script>
    // Redirect to index.html with the path stored in sessionStorage
    var pathSegmentsToKeep = 1; // Keep "/portfolio-react" prefix
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
